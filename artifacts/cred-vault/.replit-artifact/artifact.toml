kind = "web"
previewPath = "/"
title = "Cred Vault"
version = "1.0.0"
id = "artifacts/cred-vault"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23017

[services.development]
run = "pnpm --filter @workspace/cred-vault run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cred-vault", "run", "build" ]
serve = "static"
publicDir = "artifacts/cred-vault/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23017"
BASE_PATH = "/"
